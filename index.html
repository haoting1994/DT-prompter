<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主持人提詞台 / Host Prompter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  :root{
    --bg: #0B0D10;
    --panel: #14171C;
    --panel-2: #1B1F26;
    --line: #262B33;
    --text: #F2F0EB;
    --text-dim: #8B92A0;
    --tally-red: #FF3B30;
    --amber: #FFB020;
    --teal: #2FD1C4;
    --green: #34D399;
    --purple: #A78BFA;
    --blue: #3B82F6;
  }
  *{box-sizing:border-box; cursor:none !important;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--text);
    font-family: 'Inter', -apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif;
    overflow:hidden;
    cursor:none;
  }
  .mono{ font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace; }

  /* ---------- 自訂紅點光暈游標 ---------- */
  #customCursor{
    position:fixed; top:0; left:0; width:6px; height:6px; border-radius:50%;
    background:#FFFFFF;
    box-shadow:0 0 0 1px rgba(255,255,255,.35), 0 0 10px 3px rgba(255,255,255,.55), 0 0 20px 8px rgba(255,255,255,.25);
    pointer-events:none; z-index:99999;
    transform:translate(-50%,-50%);
    opacity:0; transition:opacity .15s, transform .08s ease-out;
  }
  #customCursor.show{ opacity:1; }
  #customCursor.down{ transform:translate(-50%,-50%) scale(1.5); }
  @keyframes cursorPulse{
    0%,100%{ box-shadow:0 0 0 1px rgba(255,255,255,.35), 0 0 10px 3px rgba(255,255,255,.55), 0 0 20px 8px rgba(255,255,255,.25); }
    50%{ box-shadow:0 0 0 1px rgba(255,255,255,.45), 0 0 13px 4px rgba(255,255,255,.7), 0 0 26px 10px rgba(255,255,255,.35); }
  }
  #customCursor.show{ animation:cursorPulse 1.6s ease-in-out infinite; }

  /* ---------- SETUP SCREEN ---------- */
  #setup{
    height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px; overflow-y:auto;
  }
  .setup-card{
    width:100%; max-width:1180px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 28px;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--amber); margin-bottom:8px; display:flex; align-items:center; gap:8px;
  }
  .eyebrow::before{
    content:''; width:6px; height:6px; border-radius:50%;
    background:var(--amber); display:inline-block;
  }
  h1{
    font-size:22px; margin:0 0 4px 0; font-weight:700; letter-spacing:-.01em;
  }
  .eyebrow-big{
    font-weight:800; font-size:18px; letter-spacing:-.005em;
    color:var(--text); margin-bottom:6px;
    display:flex; align-items:center; gap:8px;
  }
  .eyebrow-big::before{
    content:''; width:7px; height:7px; border-radius:50%;
    background:var(--amber); display:inline-block; flex-shrink:0;
    box-shadow:0 0 8px rgba(255,176,32,.6);
  }
  .brand-logo{
    height:32px; width:auto; display:block;
  }
  .brand-text{
    font-size:14px; font-weight:800; letter-spacing:.03em; color:var(--text);
  }
  .eyebrow-sub{
    font-size:12px; font-weight:500; color:var(--text-dim);
  }
  .sub{ color:var(--text-dim); font-size:12px; margin-bottom:14px; line-height:1.5; }

  .tabs{ display:flex; gap:8px; margin-bottom:10px; }
  .tab-btn{
    flex:1; padding:10px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--text-dim); font-size:13px; cursor:pointer;
    font-weight:600; transition:.15s;
  }
  .tab-btn.active{ background:rgba(255,176,32,.12); border-color:var(--amber); color:var(--amber); }

  .editor-wrap{
    position:relative; min-height:227px;
    background:var(--panel-2); border:1px solid var(--line); border-radius:8px;
    transition:border-color .15s;
  }
  .editor-wrap:focus-within{ border-color:var(--amber); }
  .editor-backdrop{
    position:absolute; inset:0; padding:16px 18px;
    font-size:15px; line-height:1.45; font-family:inherit;
    color:var(--text); white-space:pre-wrap; word-wrap:break-word; word-break:break-word;
    overflow:auto; pointer-events:none; scrollbar-gutter:stable;
  }
  .editor-backdrop div{ min-height:1.45em; position:relative; }
  .divider-render{ /* 高度沿用上面通用的 min-height:1.45em，不再另外指定，確保跟一般文字行完全一致 */ }
  .divider-line{
    position:absolute; top:50%; left:0; right:0; transform:translateY(-50%);
    display:block; height:2px; background:var(--amber); border-radius:1px;
    box-shadow:0 0 6px rgba(255,176,32,.45);
  }
  .countdown-render{ /* 同上，高度沿用通用規則 */ }
  .countdown-render-line{
    position:absolute; top:50%; left:0; right:0; transform:translateY(-50%);
    height:0; border-top:2px dashed var(--teal);
  }
  .countdown-render-line span{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:var(--panel-2); padding:0 8px;
    color:var(--teal); font-size:11px; letter-spacing:.1em; white-space:nowrap;
  }
  #pasteArea{
    position:relative; width:100%; min-height:227px; resize:vertical;
    background:transparent; border:none; color:transparent; caret-color:var(--text);
    padding:16px 18px; font-size:15px; line-height:1.45;
    font-family:inherit; outline:none; white-space:pre-wrap; word-break:break-word;
    word-wrap:break-word; box-sizing:border-box; margin:0; scrollbar-gutter:stable;
  }
  #pasteArea::placeholder{ color:var(--text-dim); }
  .hint{ font-size:12px; color:var(--text-dim); margin-top:6px; line-height:1.5; }

  .upload-zone{
    border:1.5px dashed var(--line); border-radius:10px; padding:36px 20px;
    text-align:center; color:var(--text-dim); cursor:pointer; transition:.15s;
    font-size:13px;
  }
  .upload-zone:hover{ border-color:var(--amber); color:var(--amber); }
  .editor-wrap.dragover{ border-color:var(--amber); box-shadow:0 0 0 2px rgba(255,176,32,.25); }
  #fileInput{ display:none; }
  .file-ok{ color:var(--teal); font-size:13px; margin-top:10px; }

  .panel-hidden{ display:none; }

  .switches-row{
    display:flex; flex-wrap:wrap; align-items:center; gap:20px;
    margin-top:10px;
  }
  .switch-item{
    display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none;
  }
  .switch-text{ font-size:12px; color:var(--text-dim); }
  .switch-track{
    position:relative; display:inline-block; width:36px; height:21px;
    background:var(--panel-2); border:1px solid var(--line); border-radius:999px;
    flex-shrink:0; transition:background-color .15s, border-color .15s;
  }
  .switch-track input{
    position:absolute; inset:0; margin:0; opacity:0; cursor:pointer; width:100%; height:100%;
  }
  .switch-thumb{
    position:absolute; top:2px; left:2px; width:15px; height:15px; border-radius:50%;
    background:var(--text-dim); transition:transform .15s, background-color .15s;
  }
  .switch-track.on .switch-thumb{
    transform:translateX(15px); background:#fff;
  }
  .switch-track.sw-teal.on{ background:var(--teal); border-color:var(--teal); }
  .switch-track.sw-purple.on{ background:var(--purple); border-color:var(--purple); }
  .switch-track.sw-blue.on{ background:var(--blue); border-color:var(--blue); }

  .screen-setup{
    margin-top:8px; padding-top:8px; border-top:1px solid var(--line);
  }
  .margin-setup{
    display:flex; align-items:center; flex-wrap:wrap; gap:6px;
    margin-top:0; font-size:12px; color:var(--text-dim);
  }
  .margin-label{ font-size:11px; color:var(--text-dim); }
  .margin-setup input{
    width:52px; background:var(--panel-2); border:1px solid var(--line); border-radius:6px;
    color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px;
    text-align:center; padding:6px 4px; outline:none;
  }
  .margin-setup input:focus{ border-color:var(--amber); }
  .insert-row{
    display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap;
  }
  .count-preview{
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--blue);
    background:var(--panel-2); border:1.5px solid var(--blue); padding:8px 12px; border-radius:8px;
    white-space:nowrap;
  }

  .start-btn{
    padding:10px 24px; border-radius:10px; border:none; flex-shrink:0;
    background:var(--tally-red); color:#fff; font-size:14px; font-weight:700;
    letter-spacing:.02em; cursor:pointer; transition:.15s; white-space:nowrap;
    margin-left:auto;
  }
  .start-btn:hover{ filter:brightness(1.08); }
  .start-btn:disabled{ background:#3a3d43; color:var(--text-dim); cursor:not-allowed; }

  .insert-btn{
    margin-top:0; padding:8px 14px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--text-dim); font-size:12px; font-weight:600;
    cursor:pointer; transition:.15s;
  }
  .insert-btn:hover{ border-color:var(--amber); color:var(--amber); }
  .insert-btn-spacer{ border-color:var(--teal); color:var(--teal); }
  .insert-btn-spacer:hover{ border-color:var(--teal); color:var(--teal); background:rgba(47,209,196,.12); }
  .insert-btn-upload{ border-color:var(--blue); color:var(--blue); }
  .insert-btn-upload:hover{ border-color:var(--blue); color:var(--blue); background:rgba(59,130,246,.12); }

  /* ---------- 雙視窗：投放接收視窗專用樣式 ---------- */
  body.present-receiver .stage-top{ display:none; }
  body.present-receiver .exit-hint{ display:none; }
  #presentOverlay{
    display:none; position:fixed; inset:0; z-index:999;
    background:rgba(0,0,0,.72); align-items:center; justify-content:center;
  }
  #presentOverlay.show{ display:flex; }
  .present-overlay-box{
    display:flex; flex-direction:column; align-items:center; gap:16px;
  }
  #presentFsBtn{
    padding:18px 32px; border-radius:12px; border:1.5px solid var(--amber);
    background:var(--panel); color:var(--amber); font-size:16px; font-weight:700;
    cursor:pointer;
  }
  #presentFsBtn:hover{ background:rgba(255,176,32,.12); }
  .present-overlay-tip{
    text-align:center; font-size:12px; color:var(--text-dim); line-height:1.7;
  }
  .present-overlay-tip b{ color:var(--text); }
  #presentWaiting{
    display:none; position:absolute; inset:0; align-items:center; justify-content:center;
    color:var(--text-dim); font-size:14px; font-family:'JetBrains Mono',monospace;
  }
  #presentWaiting.show{ display:flex; }
  #presentFsMiniBtn{
    position:absolute; left:14px; bottom:14px; z-index:998;
    padding:6px 12px; border-radius:8px; border:1px solid var(--line);
    background:rgba(20,23,28,.6); color:var(--text-dim); font-size:11px;
    cursor:pointer; opacity:.55; transition:.15s;
  }
  #presentFsMiniBtn:hover{ opacity:1; border-color:var(--amber); color:var(--amber); }
  body:not(.present-receiver) #presentFsMiniBtn{ display:none; }

  /* ---------- PRESENTER SCREEN ---------- */
  #stage{
    display:none; height:100vh; position:relative;
    flex-direction:column;
    transform:none; transform-origin:center center;
  }
  /* 單視窗模式（沒有雙視窗）：只翻轉文字內容區，工具列不翻 */
  body:not(.present-receiver) #stage.flip-h .stage-main{ transform:scaleX(-1); }
  body:not(.present-receiver) #stage.flip-v .stage-main{ transform:scaleY(-1); }
  body:not(.present-receiver) #stage.flip-h.flip-v .stage-main{ transform:scaleX(-1) scaleY(-1); }
  /* 雙視窗模式的投放接收視窗：整個畫面（含計時器位置）一起翻轉，
     這樣物理鏡面反射回去時，文字方向跟計時器左右位置才會同時正確 */
  body.present-receiver #stage.flip-h{ transform:scaleX(-1); }
  body.present-receiver #stage.flip-v{ transform:scaleY(-1); }
  body.present-receiver #stage.flip-h.flip-v{ transform:scaleX(-1) scaleY(-1); }
  .stage-top{
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:20px 28px 0 28px;
  }
  .page-indicator{
    font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-dim);
    display:flex; align-items:center; gap:10px;
  }
  .page-indicator b{ color:var(--text); font-size:15px; }
  .dots{ display:flex; gap:5px; }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--line); }
  .dot.done{ background:var(--text-dim); }
  .dot.cur{ background:var(--amber); }

  .stage-main{
    flex:1; display:flex; align-items:flex-start; justify-content:center;
    padding:32px 64px 150px 64px; text-align:left; overflow:hidden;
  }
  #stage.scroll-mode .stage-main{
    overflow-y:auto;
  }
  .scroll-divider{
    width:64px; height:2px; background:rgba(255,255,255,.6); border-radius:1px;
    margin:2.2em 0;
  }
  #cardText{
    font-size:calc(var(--auto-font, 60px) * var(--text-scale, 1));
    font-weight:700; line-height:1.48; letter-spacing:-.01em;
    max-width:1650px; width:100%; text-align:left; overflow-wrap:break-word;
  }
  #cardText .para{ margin-top:0.45em; }
  #cardText .para:first-child{ margin-top:0; }

  /* ---------- 倒數頁：一般翻頁模式（有動畫） ---------- */
  .countdown-wrap{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    width:100%; gap:28px; padding:20px 0;
  }
  .countdown-stage{
    font-weight:800; text-align:center; transition:opacity .15s;
  }
  .countdown-stage.label{
    font-size:clamp(28px, 5vw, 56px); color:var(--text-dim); letter-spacing:.08em;
  }
  .countdown-stage.number{
    font-size:clamp(90px, 20vw, 260px); color:var(--text); line-height:1;
  }
  .countdown-badge{
    width:clamp(110px,16vw,180px); height:clamp(110px,16vw,180px); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--green); color:#04231d; font-weight:800;
    font-size:clamp(16px,2vw,22px); letter-spacing:.06em;
    transition:background-color .4s ease, color .4s ease, box-shadow .4s ease;
    box-shadow:0 0 30px rgba(52,211,153,.55);
  }
  .countdown-badge.live{
    background:var(--tally-red); color:#fff;
    box-shadow:0 0 46px rgba(255,59,48,.75);
  }

  /* ---------- 倒數頁：捲動模式（靜態顯示，不做動畫） ---------- */
  #cardText .countdown-static{
    display:flex; flex-direction:column; align-items:center; gap:.3em;
    text-align:center; margin-top:0.45em;
  }
  #cardText .countdown-static:first-child{ margin-top:0; }
  #cardText .countdown-static .cs-label{ font-size:0.55em; color:var(--text-dim); letter-spacing:.08em; }
  #cardText .countdown-static .cs-dot{
    width:0.5em; height:0.5em; border-radius:50%;
    background:linear-gradient(135deg, var(--green), var(--tally-red));
  }

  .exit-hint{
    position:absolute; bottom:14px; left:28px;
    font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace;
    opacity:.6;
  }
  .section-nav{
    display:none; position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    gap:10px; z-index:50;
  }
  #stage.scroll-mode .section-nav{ display:flex; }
  .section-nav-btn{
    padding:8px 16px; border-radius:8px; border:1px solid var(--line);
    background:rgba(20,23,28,.6); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    color:var(--text-dim); font-size:12px; font-weight:600; cursor:pointer; transition:.15s;
  }
  .section-nav-btn:hover{ border-color:var(--teal); color:var(--teal); background:rgba(47,209,196,.12); }

  /* ---------- TIMER WIDGET (bottom-right, 預設) ---------- */
  #timerWidget{
    position:absolute; right:28px; bottom:24px;
    background:rgba(15,17,21,.45); border:1px solid rgba(255,255,255,.08); border-radius:18px;
    padding:18px 24px; display:flex; align-items:center; gap:18px;
    user-select:none; box-shadow:0 8px 24px rgba(0,0,0,.28);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    transition:top .2s, bottom .2s, left .2s, right .2s, transform .2s, opacity .15s;
  }
  #timerWidget.timer-hidden{
    display:none;
  }
  /* 計時器置頂置中模式（transform 由 JS 動態組合，需搭配翻轉） */
  #timerWidget.timer-top{
    right:auto; bottom:auto; left:50%; top:84px;
  }
  .tally-dot{
    width:18px; height:18px; border-radius:50%; background:var(--text-dim);
    flex-shrink:0;
  }
  .tally-dot.running{ background:var(--tally-red); box-shadow:0 0 18px var(--tally-red); animation:pulse 1s infinite; }
  .tally-dot.warn{ background:var(--amber); box-shadow:0 0 18px var(--amber); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }

  #timerDigits{
    font-family:'JetBrains Mono',monospace; font-size:92px; font-weight:700;
    min-width:300px; text-align:center; letter-spacing:.01em;
  }
  #timerDigits.warn{ color:var(--amber); }
  #timerDigits.over{ color:var(--tally-red); }

  .timer-btn{
    width:68px; height:68px; border-radius:14px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--text-dim); font-size:28px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:.15s;
  }
  .timer-btn:hover{ color:var(--text); border-color:var(--text-dim); }
  .timer-btn.on{ color:var(--amber); border-color:var(--amber); }
  #playBtn{ background:var(--tally-red); color:#fff; border-color:var(--tally-red); }
  #playBtn:hover{ filter:brightness(1.1); color:#fff; }

  .timer-setup{
    display:flex; align-items:center; gap:8px; margin-left:4px;
  }
  .timer-setup input{
    width:68px; background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
    color:var(--text); font-family:'JetBrains Mono',monospace; font-size:26px;
    text-align:center; padding:12px 4px; outline:none;
  }
  .timer-setup input:focus{ border-color:var(--amber); }
  .timer-setup span{ font-size:17px; color:var(--text-dim); }

  /* ---------- 右上角控制列：文字縮放 + 全螢幕 ---------- */
  .top-right-controls{
    display:flex; align-items:center; gap:10px;
  }
  .scale-controls{
    display:flex; align-items:center; gap:2px;
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:4px;
  }
  .scale-label{
    min-width:50px; text-align:center; font-size:12px; color:var(--text-dim); white-space:nowrap;
  }
  #scaleLabel{ min-width:92px; }
  .autoscroll-controls{
    display:none; align-items:center; gap:2px;
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:4px;
  }
  #stage.scroll-mode .autoscroll-controls{ display:flex; }
  #autoScrollToggleBtn{
    border:1.5px solid var(--teal); color:var(--teal);
  }
  #autoScrollToggleBtn:hover{
    background:rgba(47,209,196,.12);
  }
  #autoScrollToggleBtn.active{
    background:var(--teal); color:#04231d; border-color:var(--teal);
  }
  .mini-btn{
    width:34px; height:34px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--text-dim); font-size:13px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:.15s;
    white-space:nowrap; line-height:1; padding:0;
  }
  .mini-btn:hover{ color:var(--amber); border-color:var(--amber); }
  #fsBtn{
    background:var(--panel); font-size:16px;
  }
  #scaleUpBtn, #scaleDownBtn{
    border:1.5px solid var(--amber); color:var(--amber);
    width:38px; font-size:12px; letter-spacing:-.02em;
  }
  #scaleUpBtn:hover, #scaleDownBtn:hover{
    background:rgba(255,176,32,.12);
  }
  #timerPosBtn{
    border:1.5px solid var(--green); color:var(--green);
  }
  #timerPosBtn:hover{
    background:rgba(52,211,153,.12); color:var(--green); border-color:var(--green);
  }
  #editModeBtn{
    width:auto; padding:0 16px; border:1.5px solid var(--purple); color:var(--purple);
    font-size:13px; font-weight:700; letter-spacing:.02em;
  }
  #editModeBtn:hover{
    background:rgba(167,139,250,.12);
  }
  #timerToggleBtn{
    border:1.5px solid var(--tally-red); color:var(--tally-red);
  }
  #timerToggleBtn:hover{
    background:rgba(255,59,48,.12); color:var(--tally-red); border-color:var(--tally-red);
  }
  #flipHBtn, #flipVBtn{
    border:1.5px solid var(--purple); color:var(--purple);
  }
  #flipHBtn:hover, #flipVBtn:hover{
    background:rgba(167,139,250,.12);
  }
  #flipHBtn.active, #flipVBtn.active{

<!-- 這幾個是操作用的介面元素，特意放在 #stage 之外，這樣即使投放內容翻轉了，這些文字也永遠維持正常可讀方向 -->
<div id="presentWaiting">等待控制視窗連線中…</div>
<div id="presentOverlay">
  <div class="present-overlay-box">
    <button id="presentFsBtn" type="button">點此進入全螢幕</button>
    <div class="present-overlay-tip">這個視窗剛開啟時通常已經是作用中視窗<br>不想動滑鼠的話，直接按鍵盤 <b>F11</b> 也可以全螢幕</div>
  </div>
</div>
<button id="presentFsMiniBtn" type="button" title="進入全螢幕（或直接按 F11）">⛶ 全螢幕</button>

<script>
/* ---------------- 自訂紅點光暈游標 ---------------- */
(function(){
  const cursorEl = document.getElementById('customCursor');
  let shown = false;
  document.addEventListener('mousemove', (e)=>{
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top = e.clientY + 'px';
    if(!shown){ cursorEl.classList.add('show'); shown = true; }
  }, { passive:true });
  document.addEventListener('mousedown', ()=> cursorEl.classList.add('down'));
  document.addEventListener('mouseup', ()=> cursorEl.classList.remove('down'));
  document.addEventListener('mouseleave', ()=> cursorEl.classList.remove('show'));
  document.addEventListener('mouseenter', ()=>{ if(shown) cursorEl.classList.add('show'); });
})();

/* ---------------- 雙視窗：投放接收模式偵測 ---------------- */
const isPresentReceiver = new URLSearchParams(location.search).get('present') === '1';
let dualWindowMode = false;
let presentWin = null;

if(isPresentReceiver){
  document.body.classList.add('present-receiver');
  document.getElementById('setup').style.display = 'none';
  document.getElementById('stage').style.display = 'flex';
  document.getElementById('presentWaiting').classList.add('show');
  document.getElementById('presentOverlay').classList.add('show');

  function enterPresentFullscreen(){
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if(req) req.call(el).catch(()=>{});
    document.getElementById('presentOverlay').classList.remove('show');
  }
  document.getElementById('presentFsBtn').addEventListener('click', enterPresentFullscreen);
  document.getElementById('presentFsMiniBtn').addEventListener('click', enterPresentFullscreen);

  if(window.opener){
    try{ window.opener.postMessage({ type:'ready' }, '*'); }catch(e){}
  }
}

/* ---------------- 內容解析 ---------------- */
let cards = [];
let cardIndex = 0;

function splitToCards(raw){
  return raw
    .split(/^[ \t]*-{3,}[ \t]*$/m)
    .map(s => s.trim())
    .filter(s => s.length > 0);
}

/* 解析 docx 轉出的 HTML，保留 <ol> 自動編號（1. 2. 3.）與 <ul> 項目符號，
   一般段落之間仍以空白段落作為分卡依據 */
function docxHtmlToCards(html){
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const cardsOut = [];
  let pending = [];
  let orderedCounter = 1; // 持續遞增，不因為切成好幾個 <ol> 就重設

  function flushPending(){
    if(pending.length){
      const text = pending.join('\n').trim();
      if(text) cardsOut.push(text);
      pending = [];
    }
  }

  function liOwnText(li){
    let t = '';
    li.childNodes.forEach(node=>{
      if(node.nodeType === 3){ t += node.textContent; }
      else if(node.nodeType === 1 && node.tagName !== 'OL' && node.tagName !== 'UL'){
        t += node.textContent;
      }
    });
    return t.trim();
  }

  function walkList(listEl, ordered){
    Array.from(listEl.children).forEach(li=>{
      if(li.tagName !== 'LI') return;
      flushPending();
      const text = liOwnText(li);
      const prefix = ordered ? (orderedCounter + '. ') : '• ';
      if(text) cardsOut.push(prefix + text);
      if(ordered) orderedCounter++;
      Array.from(li.children).forEach(child=>{
        if(child.tagName === 'OL') walkList(child, true);
        if(child.tagName === 'UL') walkList(child, false);
      });
    });
  }

  Array.from(doc.body.children).forEach(el=>{
    if(el.tagName === 'OL'){ flushPending(); walkList(el, true); }
    else if(el.tagName === 'UL'){ flushPending(); walkList(el, false); }
    else if(el.tagName === 'P'){
      const t = el.textContent.trim();
      if(t === ''){ flushPending(); } else { pending.push(t); }
    } else {
      const t = el.textContent.trim();
      if(t) pending.push(t);
    }
  });
  flushPending();
  return cardsOut;
}

function updatePreview(){
  const count = document.getElementById('cardCount');
  count.textContent = `目前頁數：${cards.length}`;
  document.getElementById('startBtn').disabled = cards.length === 0;
}

/* ---------------- 分頁線高亮顯示 ---------------- */
const pasteBackdrop = document.getElementById('pasteBackdrop');

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderBackdrop(){
  const lines = pasteArea.value.split('\n');
  const html = lines.map(line=>{
    if(/^[ \t]*-{3,}[ \t]*$/.test(line)){
      return '<div class="divider-render"><span class="divider-line"></span></div>';
    }
    if(line.trim() === '!COUNTDOWN!'){
      return '<div class="countdown-render"><span class="countdown-render-line"><span>倒數</span></span></div>';
    }
    return '<div>' + (escapeHtml(line) || '&nbsp;') + '</div>';
  }).join('');
  pasteBackdrop.innerHTML = html;
  // 重建內容會讓背景層的捲動位置重設，這裡強制跟 textarea 重新對齊
  syncBackdropScroll();
}

// 統一的捲動同步函式：立即校正一次，並在下一個畫面更新時再校正一次
// （游標移動觸發的自動捲動有時候是非同步套用的，不會馬上觸發 scroll 事件）
function syncBackdropScroll(){
  pasteBackdrop.scrollTop = pasteArea.scrollTop;
  pasteBackdrop.scrollLeft = pasteArea.scrollLeft;
  requestAnimationFrame(()=>{
    pasteBackdrop.scrollTop = pasteArea.scrollTop;
    pasteBackdrop.scrollLeft = pasteArea.scrollLeft;
  });
}

// paste tab
const pasteArea = document.getElementById('pasteArea');
pasteArea.addEventListener('input', () => {
  cards = splitToCards(pasteArea.value);
  updatePreview();
  renderBackdrop();
});
pasteArea.addEventListener('scroll', ()=>{
  pasteBackdrop.scrollTop = pasteArea.scrollTop;
  pasteBackdrop.scrollLeft = pasteArea.scrollLeft;
});
pasteArea.addEventListener('click', syncBackdropScroll);
pasteArea.addEventListener('keyup', syncBackdropScroll);
pasteArea.addEventListener('focus', syncBackdropScroll);

// 模式頁籤：簡報模式／捲動模式
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    scrollMode = (btn.dataset.mode === 'scroll');
    if(scrollMode && !pasteArea.value.includes('!COUNTDOWN!')){
      const sep = pasteArea.value.length > 0 ? '\n\n' : '';
      pasteArea.value = '!COUNTDOWN!' + sep + pasteArea.value;
      cards = splitToCards(pasteArea.value);
      updatePreview();
      renderBackdrop();
    }
  });
});

// 在游標處插入分頁線
const insertDividerBtn = document.getElementById('insertDividerBtn');
insertDividerBtn.addEventListener('click', ()=>{
  const start = pasteArea.selectionStart;
  const end = pasteArea.selectionEnd;
  const before = pasteArea.value.slice(0, start);
  const after = pasteArea.value.slice(end);
  const insertText = (before && !before.endsWith('\n') ? '\n' : '') + '---' + (after && !after.startsWith('\n') ? '\n' : '');
  pasteArea.value = before + insertText + after;
  const newPos = (before + insertText).length;
  pasteArea.focus({ preventScroll: true });
  pasteArea.setSelectionRange(newPos, newPos);
  cards = splitToCards(pasteArea.value);
  updatePreview();
  renderBackdrop();
});

const insertCountdownBtn = document.getElementById('insertCountdownBtn');
insertCountdownBtn.addEventListener('click', ()=>{
  const start = pasteArea.selectionStart;
  const end = pasteArea.selectionEnd;
  const before = pasteArea.value.slice(0, start);
  const after = pasteArea.value.slice(end);
  let insertText;
  if(scrollMode){
    // 捲動模式：不用分頁線，只用空行讓它自成一個區塊即可
    const lead = before.length === 0 ? '' : (before.endsWith('\n\n') ? '' : (before.endsWith('\n') ? '\n' : '\n\n'));
    const trail = after.length === 0 ? '' : (after.startsWith('\n\n') ? '' : (after.startsWith('\n') ? '\n' : '\n\n'));
    insertText = lead + '!COUNTDOWN!' + trail;
  } else {
    // 簡報模式：倒數要自成一整頁，才能觸發翻到那頁時自動播放
    const lead = before.length === 0 ? '' : '\n---\n';
    const trail = after.length === 0 ? '' : '\n---\n';
    insertText = lead + '!COUNTDOWN!' + trail;
  }
  pasteArea.value = before + insertText + after;
  const newPos = (before + insertText).length;
  pasteArea.focus({ preventScroll: true });
  pasteArea.setSelectionRange(newPos, newPos);
  cards = splitToCards(pasteArea.value);
  updatePreview();
  renderBackdrop();
});

// Word 上傳（拖放到編輯框，或按「上傳 Word」按鈕）
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileStatus = document.getElementById('fileStatus');
const uploadWordBtn = document.getElementById('uploadWordBtn');

uploadWordBtn.addEventListener('click', ()=> fileInput.click());
dropZone.addEventListener('dragover', e=>{ e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', ()=> dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e=>{
  e.preventDefault(); dropZone.classList.remove('dragover');
  if(e.dataTransfer.files.length) handleDocx(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e=>{
  if(e.target.files.length) handleDocx(e.target.files[0]);
});

function handleDocx(file){
  if(!file.name.toLowerCase().endsWith('.docx')){
    fileStatus.style.color = 'var(--tally-red)';
    fileStatus.textContent = '請上傳 .docx 檔案';
    return;
  }
  fileStatus.style.color = 'var(--text-dim)';
  fileStatus.textContent = '解析中…';
  const reader = new FileReader();
  reader.onload = function(e){
    mammoth.convertToHtml({arrayBuffer: e.target.result})
      .then(function(result){
        const parsedCards = docxHtmlToCards(result.value);
        pasteArea.value = parsedCards.join('\n\n');
        cards = splitToCards(pasteArea.value);
        fileStatus.style.color = 'var(--teal)';
        fileStatus.textContent = `✓ 已匯入「${file.name}」，內容已整理到文字框，可自行編輯`;
        updatePreview();
        renderBackdrop();
      })
      .catch(function(err){
        fileStatus.style.color = 'var(--tally-red)';
        fileStatus.textContent = '解析失敗，請確認檔案格式';
      });
  };
  reader.readAsArrayBuffer(file);
}

/* ---------------- 開始主持模式 ---------------- */
function enterFullscreen(){
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if(req) req.call(el).catch(()=>{});
}
function toggleFullscreen(){
  if(document.fullscreenElement){
    document.exitFullscreen && document.exitFullscreen();
  } else {
    enterFullscreen();
  }
}
document.getElementById('fsBtn').addEventListener('click', toggleFullscreen);

/* ---------------- 雙視窗模式：暫時返回編輯畫面（投放視窗不關閉） ---------------- */
document.getElementById('editModeBtn').addEventListener('click', ()=>{
  stopAutoScroll();
  clearTimeout(countdownTimer);
  document.getElementById('stage').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  updateClosePresentBtnVisibility();
});

/* ---------------- 關閉投放視窗（按鈕 + 編輯畫面按 Esc 快捷鍵） ---------------- */
function updateClosePresentBtnVisibility(){
  const show = !!(presentWin && !presentWin.closed);
  document.getElementById('closePresentBtn').style.display = show ? 'inline-flex' : 'none';
}
document.getElementById('closePresentBtn').addEventListener('click', ()=>{
  if(presentWin && !presentWin.closed) presentWin.close();
  updateClosePresentBtnVisibility();
});
document.addEventListener('keydown', (e)=>{
  if(e.key !== 'Escape') return;
  if(document.activeElement === pasteArea) return; // 打字中不要誤觸
  if(document.getElementById('setup').style.display === 'none') return; // 投放中的 Esc 由 handleStageKey 處理
  if(presentWin && !presentWin.closed){
    presentWin.close();
    updateClosePresentBtnVisibility();
  }
});

/* ---------------- 計時器位置切換（右下角／正上方置中） ---------------- */
function updateTimerTransform(){
  const widget = document.getElementById('timerWidget');
  // 翻轉已經在雙視窗投放接收端整個 #stage 層級處理（含位置），
  // 這裡只需要處理「置頂置中」時的水平置中位移
  widget.style.transform = widget.classList.contains('timer-top') ? 'translateX(-50%)' : '';
}

document.getElementById('timerPosBtn').addEventListener('click', ()=>{
  document.getElementById('timerWidget').classList.toggle('timer-top');
  updateTimerTransform();
  fitText();
  syncPresent('full');
});

/* ---------------- 滑動開關視覺同步 ---------------- */
function syncSwitch(id){
  const cb = document.getElementById(id);
  const track = cb.closest('.switch-track');
  if(track) track.classList.toggle('on', cb.checked);
}
['flipHToggle','flipVToggle','dualWindowToggle'].forEach(id=>{
  const cb = document.getElementById(id);
  cb.addEventListener('change', ()=> syncSwitch(id));
});

/* ---------------- 螢幕翻轉即時切換 ----------------
   雙視窗模式關閉時：本機畫面直接翻轉（單一視窗，使用者自己把整個視窗搬去外接螢幕）
   雙視窗模式開啟時：本機控制視窗永遠不翻轉，只把翻轉狀態同步給投放視窗 */
function setFlipH(on){
  const cb = document.getElementById('flipHToggle');
  cb.checked = on;
  syncSwitch('flipHToggle');
  document.getElementById('flipHBtn').classList.toggle('active', on);
  document.getElementById('stage').classList.toggle('flip-h', on && !dualWindowMode);
  updateTimerTransform();
  syncPresent('full');
}
function setFlipV(on){
  const cb = document.getElementById('flipVToggle');
  cb.checked = on;
  syncSwitch('flipVToggle');
  document.getElementById('flipVBtn').classList.toggle('active', on);
  document.getElementById('stage').classList.toggle('flip-v', on && !dualWindowMode);
  updateTimerTransform();
  syncPresent('full');
}
document.getElementById('flipHBtn').addEventListener('click', function(){
  setFlipH(!document.getElementById('flipHToggle').checked);
});
document.getElementById('flipVBtn').addEventListener('click', function(){
  setFlipV(!document.getElementById('flipVToggle').checked);
});

/* 接收視窗專用：無條件套用翻轉（不受 dualWindowMode 影響，因為它本身就是投放輸出） */
function receiverApplyFlip(flipH, flipV){
  document.getElementById('stage').classList.toggle('flip-h', flipH);
  document.getElementById('stage').classList.toggle('flip-v', flipV);
  updateTimerTransform();
}

/* ---------------- 雙視窗：開啟投放視窗＋狀態同步 ---------------- */
async function openPresentWindow(){
  if(presentWin && !presentWin.closed){ presentWin.focus(); return; }
  const url = new URL(location.href);
  url.searchParams.set('present', '1');

  // 預設 fallback：開在目前視窗右側
  let left = window.screenX + window.outerWidth;
  let top = window.screenY;
  let width = 1280, height = 720;

  // 若瀏覽器支援 Window Management API，嘗試自動找出「另一個螢幕」並直接鋪滿過去
  if('getScreenDetails' in window){
    try{
      const details = await window.getScreenDetails();
      const current = details.currentScreen;
      const other = details.screens.find(s => s !== current);
      if(other){
        left = other.availLeft;
        top = other.availTop;
        width = other.availWidth;
        height = other.availHeight;
      }
    }catch(e){
      // 使用者拒絕授權或瀏覽器不支援，維持預設 fallback 位置
    }
  }

  const features = `left=${left},top=${top},width=${width},height=${height},menubar=no,toolbar=no,location=no,status=no`;
  try{
    presentWin = window.open(url.toString(), 'hostPrompterPresent', features);
    if(presentWin){ presentWin.focus(); }
  }catch(err){
    presentWin = null;
  }

  if(!presentWin){
    dualWindowMode = false;
    document.getElementById('dualWindowToggle').checked = false;
    syncSwitch('dualWindowToggle');
    document.getElementById('editModeBtn').style.display = 'none';
    setFlipH(document.getElementById('flipHToggle').checked);
    setFlipV(document.getElementById('flipVToggle').checked);
    alert(
      '無法開啟投放視窗。\n\n' +
      '這通常是因為這個檔案是用「直接雙擊 file:// 開啟」的方式打開——Chrome 基於安全限制，\n' +
      '不允許本機檔案這樣開啟第二個視窗（即使是同一個檔案也一樣）。\n\n' +
      '雙視窗模式已自動關閉，改用單視窗模式繼續投放，不影響現在的操作。\n\n' +
      '如果之後真的需要雙視窗模式，需要把這個 HTML 檔案放到網頁伺服器上開啟\n' +
      '（例如本機 http://localhost、或部署到 GitHub Pages／Firebase Hosting），\n' +
      '不能用「檔案總管雙擊打開」的方式。'
    );
    if(!document.fullscreenElement){
      enterFullscreen();
    }
  }
}

let lastTickSync = 0;
function syncPresent(kind){
  if(!dualWindowMode || isPresentReceiver) return;
  if(!presentWin || presentWin.closed) return;
  if(kind === 'tick'){
    const now = performance.now();
    if(now - lastTickSync < 50) return; // 節流，避免洗版
    lastTickSync = now;
    try{
      presentWin.postMessage({
        type:'tick',
        timerText: document.getElementById('timerDigits').textContent,
        timerClass: document.getElementById('timerDigits').className,
        timerRunning: document.getElementById('tallyDot').classList.contains('running'),
        scrollTop: scrollMode ? stageMainEl.scrollTop : null
      }, '*');
    }catch(e){}
    return;
  }
  try{
    presentWin.postMessage({
      type:'full',
      cards: cards,
      cardIndex: cardIndex,
      scrollMode: scrollMode,
      scale: textScale,
      flipH: document.getElementById('flipHToggle').checked,
      flipV: document.getElementById('flipVToggle').checked,
      padding: stageMainEl.style.padding,
      timerTop: document.getElementById('timerWidget').classList.contains('timer-top'),
      timerHidden: document.getElementById('timerWidget').classList.contains('timer-hidden')
    }, '*');
  }catch(e){}
}

if(!isPresentReceiver){
  window.addEventListener('message', (e)=>{
    const msg = e.data;
    if(!msg || !msg.type) return;
    if(msg.type === 'ready' && e.source === presentWin){
      syncPresent('full');
    } else if(msg.type === 'key' && e.source === presentWin){
      // 投放視窗（外接螢幕）如果不小心被搶走焦點，簡報筆按鍵會轉發回這裡繼續正常運作
      handleStageKey(msg.key);
    }
  });
} else {
  window.addEventListener('message', (e)=>{
    const msg = e.data;
    if(!msg || !msg.type) return;
    document.getElementById('presentWaiting').classList.remove('show');
    if(msg.type === 'full'){
      cards = msg.cards;
      cardIndex = msg.cardIndex;
      scrollMode = msg.scrollMode;
      textScale = msg.scale;
      stageMainEl.style.padding = msg.padding;
      document.getElementById('timerWidget').classList.toggle('timer-top', msg.timerTop);
      document.getElementById('timerWidget').classList.toggle('timer-hidden', msg.timerHidden);
      receiverApplyFlip(msg.flipH, msg.flipV);
      document.getElementById('stage').classList.toggle('scroll-mode', scrollMode);
      if(scrollMode){
        renderScrollContent();
      } else {
        buildDots();
        renderCard();
      }
      applyScale();
    } else if(msg.type === 'tick'){
      if(msg.timerText != null){
        timerDigits.textContent = msg.timerText;
        timerDigits.className = msg.timerClass;
        tallyDot.classList.toggle('running', msg.timerRunning);
      }
      if(msg.scrollTop != null && scrollMode){
        stageMainEl.scrollTop = msg.scrollTop;
      }
    }
  });
}

/* ---------------- 計時器顯示／隱藏 ---------------- */
document.getElementById('timerToggleBtn').addEventListener('click', function(){
  const widget = document.getElementById('timerWidget');
  const hidden = widget.classList.toggle('timer-hidden');
  this.classList.toggle('on', hidden);
  fitText();
});

/* ---------------- 投放文字比例縮放 ---------------- */
let textScale = 1;
const cardTextEl = document.getElementById('cardText');
const scaleLabel = document.getElementById('scaleLabel');

function applyScale(){
  cardTextEl.style.setProperty('--text-scale', textScale);
  const px = Math.round(parseFloat(getComputedStyle(cardTextEl).fontSize)) || 0;
  scaleLabel.textContent = Math.round(textScale * 100) + '% · ' + px + 'px';
  syncPresent('full');
}
function scaleUp(){ textScale = Math.min(10.0, +(textScale + 0.02).toFixed(2)); applyScale(); }
function scaleDown(){ textScale = Math.max(0.5, +(textScale - 0.02).toFixed(2)); applyScale(); }
function scaleReset(){ textScale = 1; applyScale(); }

/* 按住持續縮放（會隨按住時間加速） */
function bindHold(btn, fn){
  let timer = null;
  let count = 0;
  function tick(){
    fn();
    count++;
    const nextDelay = Math.max(25, 70 - count * 3);
    timer = setTimeout(tick, nextDelay);
  }
  function start(e){
    e.preventDefault();
    count = 0;
    fn();
    clearTimeout(timer);
    timer = setTimeout(tick, 300);
  }
  function stop(){ clearTimeout(timer); timer = null; }
  btn.addEventListener('mousedown', start);
  btn.addEventListener('touchstart', start, { passive:false });
  ['mouseup','mouseleave','touchend','touchcancel'].forEach(evt => btn.addEventListener(evt, stop));
}
bindHold(document.getElementById('scaleUpBtn'), scaleUp);
bindHold(document.getElementById('scaleDownBtn'), scaleDown);

/* ---------------- 自動計算最適合的字級（避免溢出或留白過多） ---------------- */
const stageMainEl = document.querySelector('.stage-main');
stageMainEl.addEventListener('scroll', ()=> syncPresent('tick'), { passive:true });

/* 觸控板雙指縮放（Chrome/Firefox 會以 ctrlKey+wheel 呈現，Safari 用 gesture 事件） */
const stageEl = document.getElementById('stage');
stageEl.addEventListener('wheel', (e)=>{
  if(!e.ctrlKey) return;
  if(stageEl.style.display !== 'flex') return;
  e.preventDefault();
  if(e.deltaY < 0) scaleUp(); else scaleDown();
}, { passive:false });

/* 一般翻頁模式：滑鼠滾輪也能翻頁（節流，避免一次滾動連跳好幾頁） */
let wheelPageLock = false;
stageEl.addEventListener('wheel', (e)=>{
  if(e.ctrlKey) return;               // ctrl+滾輪是縮放，交給上面那個處理
  if(isPresentReceiver) return;       // 投放接收視窗不自己處理，統一由控制視窗操作
  if(scrollMode) return;              // 捲動模式本來就靠原生滾動，不需要這段
  if(stageEl.style.display !== 'flex') return;
  if(Math.abs(e.deltaY) < 12) return; // 太小的抖動忽略
  e.preventDefault();
  if(wheelPageLock) return;
  wheelPageLock = true;
  setTimeout(()=>{ wheelPageLock = false; }, 260);
  if(e.deltaY > 0) nextCard(); else prevCard();
}, { passive:false });

let gestureBaseScale = 1;
stageEl.addEventListener('gesturestart', (e)=>{
  e.preventDefault();
  gestureBaseScale = textScale;
});
stageEl.addEventListener('gesturechange', (e)=>{
  e.preventDefault();
  textScale = Math.min(3.0, Math.max(0.5, +(gestureBaseScale * e.scale).toFixed(2)));
  applyScale();
});

function fitText(){
  if(document.getElementById('stage').style.display !== 'flex') return;
  if(scrollMode) return; // 捲動模式用固定基準字級，不要被 resize/全螢幕事件改動
  const available = stageMainEl.clientHeight - 4;
  const maxSize = 84;
  const minSize = 22;
  let size = maxSize;
  cardTextEl.style.fontSize = size + 'px';
  while(size > minSize && cardTextEl.scrollHeight > available){
    size -= 2;
    cardTextEl.style.fontSize = size + 'px';
  }
  cardTextEl.style.fontSize = '';
  cardTextEl.style.setProperty('--auto-font', size + 'px');
}

let fitTextTimer = null;
window.addEventListener('resize', ()=>{
  clearTimeout(fitTextTimer);
  fitTextTimer = setTimeout(fitText, 120);
});
document.addEventListener('fullscreenchange', ()=> setTimeout(fitText, 60));

let scrollMode = false;

document.getElementById('startBtn').addEventListener('click', ()=>{
  if(cards.length === 0) return;
  dualWindowMode = document.getElementById('dualWindowToggle').checked;
  cardIndex = 0;
  const stageEl2 = document.getElementById('stage');
  document.getElementById('setup').style.display = 'none';
  stageEl2.style.display = 'flex';
  stageEl2.classList.toggle('scroll-mode', scrollMode);
  document.querySelector('.dots').style.display = scrollMode ? 'none' : 'flex';

  // 螢幕翻轉（適合提詞機鏡面反射）
  const flipH = document.getElementById('flipHToggle').checked;
  const flipV = document.getElementById('flipVToggle').checked;
  setFlipH(flipH);
  setFlipV(flipV);

  // 手動邊距（配合提詞螢幕視線）
  const mTop = parseInt(document.getElementById('marginTop').value, 10) || 0;
  const mBottom = parseInt(document.getElementById('marginBottom').value, 10) || 0;
  const mLR = parseInt(document.getElementById('marginLR').value, 10) || 0;
  stageMainEl.style.padding = mTop + 'px ' + mLR + 'px ' + mBottom + 'px ' + mLR + 'px';

  updateExitHint();
  document.getElementById('editModeBtn').style.display = dualWindowMode ? 'flex' : 'none';

  if(dualWindowMode){
    openPresentWindow();
  }

  if(scrollMode){
    renderScrollContent();
  } else {
    buildDots();
    renderCard();
  }
  if(!dualWindowMode){
    enterFullscreen();
  }
  syncPresent('full');
});

function updateExitHint(){
  const hint = document.querySelector('.exit-hint');
  hint.textContent = scrollMode
    ? 'Esc 返回設定 ｜ PageUp/PageDown、← → ↑ ↓ 或滾輪捲動畫面 ｜ P 自動捲動開關 ｜ +/－ 調整文字大小、0 重設'
    : 'Esc 返回設定 ｜ PageUp/PageDown、← → 或空白鍵翻頁 ｜ +/－ 調整文字大小、0 重設';
}

function buildDots(){
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  cards.forEach(()=>{
    const d = document.createElement('div');
    d.className = 'dot';
    dots.appendChild(d);
  });
  document.getElementById('pageTotal').textContent = cards.length;
}

function paragraphsHtml(raw){
  const paragraphs = raw.split(/\n{2,}/).map(p => p.trim()).filter(p => p.length > 0);
  return paragraphs.map(p => {
    if(p === '!COUNTDOWN!'){
      return '<div class="countdown-static">' +
        '<span class="cs-label">現場準備</span>' +
        '<span>3</span><span>2</span><span>1</span>' +
        '<span class="cs-dot"></span>' +
      '</div>';
    }
    return '<div class="para">' + escapeHtml(p).replace(/\n/g, '<br>') + '</div>';
  }).join('');
}

let countdownTimer = null;

function renderCard(){
  clearTimeout(countdownTimer);
  const raw = cards[cardIndex];
  if(raw.trim() === '!COUNTDOWN!'){
    document.getElementById('cardText').innerHTML =
      '<div class="countdown-wrap" id="countdownWrap"><div class="countdown-stage label" id="countdownStage">現場準備</div></div>';
    cardTextEl.style.setProperty('--auto-font', '1px'); // 倒數用自己的 clamp 尺寸，不要被自動縮放蓋掉
    runCountdownSequence();
  } else {
    document.getElementById('cardText').innerHTML = paragraphsHtml(raw);
    fitText();
  }
  document.getElementById('pageNum').textContent = cardIndex + 1;
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('cur', i===cardIndex);
    d.classList.toggle('done', i<cardIndex);
  });
  syncPresent('full');
}

function runCountdownSequence(){
  clearTimeout(countdownTimer);
  const seq = [
    { text:'現場準備', cls:'label' },
    { text:'3', cls:'number' },
    { text:'2', cls:'number' },
    { text:'1', cls:'number' }
  ];
  let i = 0;
  function step(){
    const stageNode = document.getElementById('countdownStage');
    if(!stageNode) return; // 已經離開這一頁
    if(i < seq.length){
      stageNode.textContent = seq[i].text;
      stageNode.className = 'countdown-stage ' + seq[i].cls;
      i++;
      countdownTimer = setTimeout(step, 1000);
    } else {
      const wrap = document.getElementById('countdownWrap');
      if(!wrap) return;
      wrap.innerHTML = '<div class="countdown-badge" id="countdownBadge">STANDBY</div>';
      countdownTimer = setTimeout(()=>{
        const badge = document.getElementById('countdownBadge');
        if(badge){ badge.classList.add('live'); badge.textContent = 'ON AIR'; }
      }, 400);
    }
  }
  step();
}

function renderScrollContent(){
  const html = cards.map((c, i) =>
    '<div class="scroll-section" data-section="' + i + '">' + paragraphsHtml(c) + '</div>'
  ).join('<div class="scroll-divider"></div>');
  document.getElementById('cardText').innerHTML = html;
  document.getElementById('pageNum').textContent = '∞';
  document.getElementById('pageTotal').textContent = cards.length + ' 段';
  cardTextEl.style.removeProperty('font-size');
  cardTextEl.style.setProperty('--auto-font', '56px');
  stageMainEl.scrollTop = 0;
  stopAutoScroll();
  syncPresent('full');
}

function jumpSection(direction){
  const sections = Array.from(document.querySelectorAll('.scroll-section'));
  if(sections.length === 0) return;
  const current = stageMainEl.scrollTop;
  let idx = 0;
  sections.forEach((sec, i)=>{
    if(sec.offsetTop <= current + 8) idx = i;
  });
  idx = Math.max(0, Math.min(sections.length - 1, idx + direction));
  stageMainEl.scrollTo({ top: sections[idx].offsetTop, behavior:'smooth' });
  syncPresent('tick');
}

/* ---------------- 自動捲動（速度可調，僅捲動模式使用） ---------------- */
let autoScrollOn = false;
let autoScrollSpeed = 1.0;
let autoScrollRAF = null;
let autoScrollLastTs = null;
let autoScrollCarry = 0; // 次像素餘數，避免低速時被無條件捨去
const AUTO_SCROLL_BASE_PX_PER_SEC = 40;

function autoScrollTick(ts){
  if(!autoScrollOn) return;
  if(autoScrollLastTs == null) autoScrollLastTs = ts;
  const dt = (ts - autoScrollLastTs) / 1000;
  autoScrollLastTs = ts;
  // 永遠以「目前實際捲動位置」為基準疊加，不覆寫成舊的絕對值，
  // 這樣使用者手動滑動時不會被搶走、也不會卡住
  const deltaPx = AUTO_SCROLL_BASE_PX_PER_SEC * autoScrollSpeed * dt + autoScrollCarry;
  const wholePx = Math.floor(deltaPx);
  autoScrollCarry = deltaPx - wholePx;
  if(wholePx > 0){
    stageMainEl.scrollTop += wholePx;
    syncPresent('tick');
  }
  if(stageMainEl.scrollTop >= stageMainEl.scrollHeight - stageMainEl.clientHeight - 1){
    stopAutoScroll();
    return;
  }
  autoScrollRAF = requestAnimationFrame(autoScrollTick);
}
function startAutoScroll(){
  autoScrollOn = true;
  autoScrollLastTs = null;
  autoScrollCarry = 0;
  const btn = document.getElementById('autoScrollToggleBtn');
  btn.textContent = '⏸';
  btn.classList.add('active');
  autoScrollRAF = requestAnimationFrame(autoScrollTick);
}
function stopAutoScroll(){
  autoScrollOn = false;
  const btn = document.getElementById('autoScrollToggleBtn');
  btn.textContent = '▶';
  btn.classList.remove('active');
  if(autoScrollRAF) cancelAnimationFrame(autoScrollRAF);
  autoScrollRAF = null;
}
function toggleAutoScroll(){ autoScrollOn ? stopAutoScroll() : startAutoScroll(); }
function speedUp(){ autoScrollSpeed = Math.min(5, +(autoScrollSpeed + 0.1).toFixed(1)); updateSpeedLabel(); }
function speedDown(){ autoScrollSpeed = Math.max(0.1, +(autoScrollSpeed - 0.1).toFixed(1)); updateSpeedLabel(); }
function updateSpeedLabel(){ document.getElementById('speedLabel').textContent = autoScrollSpeed.toFixed(1) + 'x'; }

document.getElementById('autoScrollToggleBtn').addEventListener('click', toggleAutoScroll);
document.getElementById('prevSectionBtn').addEventListener('click', ()=> jumpSection(-1));
document.getElementById('nextSectionBtn').addEventListener('click', ()=> jumpSection(1));
document.getElementById('speedUpBtn').addEventListener('click', speedUp);
document.getElementById('speedDownBtn').addEventListener('click', speedDown);

function nextCard(){ if(cardIndex < cards.length-1){ cardIndex++; renderCard(); } }
function prevCard(){ if(cardIndex > 0){ cardIndex--; renderCard(); } }

/* 鍵盤：PageUp/PageDown（簡報筆預設）、方向鍵、空白鍵、Esc 返回 */
function handleStageKey(key, preventDefault){
  if(document.getElementById('stage').style.display !== 'flex') return;

  if(scrollMode){
    switch(key){
      case 'PageDown':
      case 'ArrowRight':
      case 'ArrowDown':
      case ' ':
        if(preventDefault) preventDefault();
        stageMainEl.scrollBy({ top: stageMainEl.clientHeight * 0.55, behavior:'smooth' });
        syncPresent('tick');
        break;
      case 'PageUp':
      case 'ArrowLeft':
      case 'ArrowUp':
        if(preventDefault) preventDefault();
        stageMainEl.scrollBy({ top: -stageMainEl.clientHeight * 0.55, behavior:'smooth' });
        syncPresent('tick');
        break;
      case '+':
      case '=':
        if(preventDefault) preventDefault(); scaleUp(); break;
      case '-':
      case '_':
        if(preventDefault) preventDefault(); scaleDown(); break;
      case '0':
        if(preventDefault) preventDefault(); scaleReset(); break;
      case 'p':
      case 'P':
        if(preventDefault) preventDefault(); toggleAutoScroll(); break;
      case 'Escape':
        stopAutoScroll();
        document.getElementById('stage').style.display = 'none';
        document.getElementById('setup').style.display = 'flex';
        pauseTimer();
        if(presentWin && !presentWin.closed) presentWin.close();
        break;
    }
    return;
  }

  switch(key){
    case 'PageDown':
    case 'ArrowRight':
    case ' ':
      if(preventDefault) preventDefault(); nextCard(); break;
    case 'PageUp':
    case 'ArrowLeft':
      if(preventDefault) preventDefault(); prevCard(); break;
    case '+':
    case '=':
      if(preventDefault) preventDefault(); scaleUp(); break;
    case '-':
    case '_':
      if(preventDefault) preventDefault(); scaleDown(); break;
    case '0':
      if(preventDefault) preventDefault(); scaleReset(); break;
    case 'Escape':
      clearTimeout(countdownTimer);
      document.getElementById('stage').style.display = 'none';
      document.getElementById('setup').style.display = 'flex';
      pauseTimer();
      if(presentWin && !presentWin.closed) presentWin.close();
      break;
  }
}

document.addEventListener('keydown', (e)=>{
  if(isPresentReceiver){
    // 萬一焦點不小心跑到投放視窗（外接螢幕那邊），把按鍵轉發回控制視窗繼續處理，
    // 避免簡報筆按鍵被投放視窗默默吃掉、變成翻不動頁/捲不動的情況
    const forwardKeys = ['PageDown','PageUp','ArrowRight','ArrowLeft','ArrowUp','ArrowDown',' ','+','=','-','_','0','p','P','Escape'];
    if(forwardKeys.includes(e.key) && window.opener){
      e.preventDefault();
      try{ window.opener.postMessage({ type:'key', key:e.key }, '*'); }catch(err){}
      try{ window.opener.focus(); }catch(err){}
    }
    return;
  }
  handleStageKey(e.key, ()=> e.preventDefault());
});

/* ---------------- 計時器：倒數 / 正數 可切換 ---------------- */
let mode = 'stopwatch'; // 'countdown' | 'stopwatch'  ← 預設正數
let running = false;
let elapsedMs = 0;       // stopwatch: 累計時間 / countdown: 已經過時間
let countdownTotalMs = 5 * 60 * 1000;
let tickHandle = null;
let lastTick = null;

const timerDigits = document.getElementById('timerDigits');
const tallyDot = document.getElementById('tallyDot');
const playBtn = document.getElementById('playBtn');
const modeBtn = document.getElementById('modeBtn');
const minInput = document.getElementById('minInput');
const countdownSetup = document.getElementById('countdownSetup');
const resetBtn = document.getElementById('resetBtn');

function fmt(ms){
  const sign = ms < 0 ? '-' : '';
  ms = Math.abs(ms);
  const totalSec = Math.floor(ms/1000);
  const m = Math.floor(totalSec/60);
  const s = totalSec % 60;
  return `${sign}${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateDigits(){
  let display;
  timerDigits.classList.remove('warn','over');
  if(mode === 'countdown'){
    const remain = countdownTotalMs - elapsedMs;
    display = fmt(remain);
    if(remain <= 0){ timerDigits.classList.add('over'); tallyDot.classList.toggle('warn', false); }
    else if(remain <= 30000){ timerDigits.classList.add('warn'); }
  } else {
    display = fmt(elapsedMs);
  }
  timerDigits.textContent = display;
  syncPresent('tick');
}

function tick(ts){
  if(!running) return;
  if(lastTick == null) lastTick = ts;
  elapsedMs += (ts - lastTick);
  lastTick = ts;
  updateDigits();
  tickHandle = requestAnimationFrame(tick);
}

function startTimer(){
  running = true;
  lastTick = null;
  tallyDot.classList.add('running');
  playBtn.textContent = '❚❚';
  tickHandle = requestAnimationFrame(tick);
}
function pauseTimer(){
  running = false;
  tallyDot.classList.remove('running');
  playBtn.textContent = '▶';
  if(tickHandle) cancelAnimationFrame(tickHandle);
}
function resetTimer(){
  pauseTimer();
  elapsedMs = 0;
  updateDigits();
}

playBtn.addEventListener('click', ()=>{
  running ? pauseTimer() : startTimer();
});
resetBtn.addEventListener('click', resetTimer);

modeBtn.addEventListener('click', ()=>{
  mode = (mode === 'countdown') ? 'stopwatch' : 'countdown';
  modeBtn.classList.toggle('on', mode === 'countdown');
  countdownSetup.style.display = (mode === 'countdown') ? 'flex' : 'none';
  resetTimer();
});
minInput.addEventListener('change', ()=>{
  const mins = Math.max(0, Math.min(180, Number(minInput.value) || 0));
  minInput.value = mins;
  countdownTotalMs = mins * 60 * 1000;
  if(!running) updateDigits();
});

updateDigits();

/* 初始解析一次（textarea 預設為空）*/
cards = splitToCards(pasteArea.value);
updatePreview();
renderBackdrop();
</script>
